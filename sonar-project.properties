sonar.projectKey=adidev4code_8.1CDevSecOps
sonar.organization=adidev4code
sonar.host.url=https://sonarcloud.io

sonar.projectName=NodeJS Goof Vulnerable App
sonar.sourceEncoding=UTF-8

# Scan current directory (nodejs-goof has no separate src/ folder)
sonar.sources=.

# Exclude dependencies, test files, and generated coverage output from analysis
sonar.exclusions=node_modules/**,test/**,coverage/**

# LCOV report path - generated by 'npm run coverage' if the script exists
# SonarCloud will warn (not fail) if this file is absent
sonar.javascript.lcov.reportPaths=coverage/lcov.info
